name: Agent Quality Gate

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run workflow-doc checks
        shell: pwsh
        run: |
          ./scripts/qa/check-superpowers-docs.ps1 -RepoRoot .

      - name: Run seat-locator tests
        run: node --test tests/seat-locator.coordkey.test.js

      - name: Run seat-map-generator tests
        run: node --test tests/seat-map-generator.coordkey.test.js
